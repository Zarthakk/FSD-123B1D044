<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fashion Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .card:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }

        .cart-box {
            position: fixed;
            right: 20px;
            top: 80px;
            width: 300px;
            background: white;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark p-3">
    <div class="container">
        <h3 class="text-white">Fashion Store</h3>
        <button class="btn btn-warning">
            Cart (<span id="cart-count">0</span>)
        </button>
    </div>
</nav>

<!-- Products -->
<div class="container mt-4">
    <div class="row" id="product-list"></div>
</div>

<!-- Cart -->
<div class="cart-box">
    <h5>Cart</h5>
    <ul id="cart-items"></ul>
    <h6>Total: ₹<span id="total">0</span></h6>
</div>

<script>
    // Product Data
    const products = [
        {id:1, name:"T-Shirt", price:500, img:"https://lh5.googleusercontent.com/proxy/4uenBieB3l_rBnPOeBoOigL-a0C2CJe4ljZ1wk7gogOSxEYlNdEs_vSeP3nP905PyOTXGBUI4BUxDVRC_vVfyxWwQzbrNbPf6r2HjBvzszUKw8xJyY-TPWCAiZLcZ2mkd4v6x8Cunm0rWIz0VcuEpU-5l2tcjiLRdhdyhN4EXcRhG-6Uow"},
        {id:2, name:"Jeans", price:1200, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTM9rdSgH3DpYo-sMJmDTMFeskiIfX05Z8RMQ&s"},
        {id:3, name:"Jacket", price:2000, img:"https://lh5.googleusercontent.com/proxy/BqaldmbV2xppcyJrQ3IIxc82rSoFy4Aj6DAD_vvM6ivgWNzoTKSRyvB1ByKIOwVb9yBjAZXPNygv1LKWIAeRTSG8eApXerputvqBRS-eDnwCOuIk5WxWbSffiXnacdU3ZT4"},
        {id:4, name:"Sneakers", price:2500, img:"https://lh5.googleusercontent.com/proxy/Bi02xOYsxA0wNX1PbV3s6TOP8Bglsf9gQQ7_f8yeLQYw3iks6jEnPiUrbDXnCQ6cPPiVq2DlaSHfHdiK_3G2B3LTgBh7UaQKpqQaB9bnRgUz8xF4wJ70RKe4zQV8xzi51Z28zcvTz5-tXE8x2zg2P49Dxe_autoadddr"}
    ];

    let cart = [];

    // Display Products
    function displayProducts() {
        let output = "";
        products.forEach(p => {
            output += `
            <div class="col-md-3">
                <div class="card p-2">
                    <img src="${p.img}" class="card-img-top">
                    <div class="card-body text-center">
                        <h5>${p.name}</h5>
                        <p>₹${p.price}</p>
                        <button class="btn btn-primary" onclick="addToCart(${p.id})">
                            Add to Cart
                        </button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById("product-list").innerHTML = output;
    }

    // Add to Cart
    function addToCart(id) {
        const product = products.find(p => p.id === id);
        cart.push(product);
        updateCart();
    }

    // Update Cart UI
    function updateCart() {
        let items = "";
        let total = 0;

        cart.forEach(item => {
            items += `<li>${item.name} - ₹${item.price}</li>`;
            total += item.price;
        });

        document.getElementById("cart-items").innerHTML = items;
        document.getElementById("total").innerText = total;
        document.getElementById("cart-count").innerText = cart.length;
    }

    displayProducts();
</script>

</body>
</html>
