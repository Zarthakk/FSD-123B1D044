<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Portfolio</title>
    <link rel="stylesheet" href="style.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="#">Portfolio</a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
            <li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li>
            <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
        </ul>
    </div>
</nav>

<!-- Hero -->
<section class="hero" id="hero-section">
    <div class="container">
        <h1>Sarthak Bagde</h1>
        <p class="typing" id="typing"></p>
    </div>
</section>

<!-- About -->
<section id="about" class="container py-5" data-aos="fade-up">
    <h2>About Me</h2>
    <p>I am a passionate developer who loves building interactive web experiences.</p>
</section>

<!-- Skills -->
<section id="skills" class="container py-5" data-aos="fade-right">
    <h2>Skills</h2>

    <p>HTML</p>
    <div class="progress">
        <div class="progress-bar bg-success" style="width: 90%">90%</div>
    </div>

    <p>CSS</p>
    <div class="progress">
        <div class="progress-bar bg-info" style="width: 80%">80%</div>
    </div>

    <p>JavaScript</p>
    <div class="progress">
        <div class="progress-bar bg-warning" style="width: 70%">70%</div>
    </div>
</section>

<!-- Projects -->
<section id="projects" class="container py-5" data-aos="zoom-in">
    <h2 class="text-center mb-4">Projects</h2>

    <div class="row">
        <div class="col-md-4">
            <div class="project-card card">
                <img src="assets/project1.png" class="card-img-top">
                <div class="overlay">View Project</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="project-card card">
                <img src="assets/project2.png" class="card-img-top">
                <div class="overlay">View Project</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="project-card card">
                <img src="assets/project3.png" class="card-img-top">
                <div class="overlay">View Project</div>
            </div>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 Sarthak Bagde</p>
</footer>

<!-- Scripts -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
    AOS.init();

    // Typing Effect
    const text = "Full Stack Developer | Aspiring Computer Engineer | Bibliophile";
    let i = 0;
    function typing() {
        if (i < text.length) {
            document.getElementById("typing").innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 50);
        }
    }
    typing();

    // Button Ripple Effect
    document.querySelectorAll(".btn").forEach(button => {
        button.addEventListener("click", function(e) {
            let x = e.clientX - e.target.offsetLeft;
            let y = e.clientY - e.target.offsetTop;

            let ripple = document.createElement("span");
            ripple.style.left = x + "px";
            ripple.style.top = y + "px";

            this.appendChild(ripple);

            setTimeout(() => ripple.remove(), 600);
        });
    });
</script>

</body>
</html>
